# ============================================================
# board-service 애플리케이션 설정
#
# 기술 스택: Spring Boot WebFlux + MongoDB Reactive + Redis Reactive + Kafka
# 포트: 8083
#
# 환경변수 주입 패턴: ${ENV_VAR:default_value}
# - 운영 환경에서는 Docker/K8s 환경변수로 주입
# - 개발 환경에서는 default_value 사용
# ============================================================

server:
  port: 8083
  # Netty 서버 설정 (WebFlux는 Netty를 기본 서버로 사용)
  netty:
    connection-timeout: 10s     # 클라이언트 연결 수립 최대 대기 시간
    idle-timeout: 60s           # 유휴 연결 유지 시간 (이후 자동 종료)

spring:
  application:
    name: board-service         # Eureka 서비스 등록명, Kafka 클라이언트 ID에 사용

  # ── MongoDB 설정 ─────────────────────────────────────────────────────────────
  # Spring Data MongoDB Reactive: ReactiveMongoRepository 기반 비동기 CRUD
  # MongoDB는 Document 모델로 게시글(태그, 반응 등 중첩 구조) 저장에 적합
  data:
    mongodb:
      # MongoDB 연결 URI (인증 포함)
      # 형식: mongodb://username:password@host:port/database
      uri: ${MONGODB_URI:mongodb://localhost:27017/web3community}
      # 인증 데이터베이스 (기본값: admin)
      authentication-database: admin

      # MongoDB 연결 풀 설정 (Reactive 드라이버는 내부적으로 커넥션 풀 관리)
      # ReactiveMongoClient는 단일 인스턴스로 모든 요청 처리 (Non-blocking)

    # ── Redis 설정 ─────────────────────────────────────────────────────────────
    # 게시글 상세 캐싱 (5분 TTL), 좋아요/싫어요 카운트 캐싱에 사용
    # Lettuce 클라이언트: Non-blocking, 비동기 Redis 연산 지원
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}          # 개발 환경에서는 비밀번호 없이 사용
      database: 1                           # DB 인덱스 (0: api-gateway, 1: board-service)
      # Lettuce 커넥션 풀 (Reactive 환경에서 성능 최적화)
      lettuce:
        pool:
          max-active: 16    # 최대 활성 연결 수 (동시 요청 처리량에 맞게 조정)
          max-idle: 8       # 최대 유휴 연결 수
          min-idle: 2       # 최소 유휴 연결 수 (사전 생성하여 지연 방지)
          max-wait: -1ms    # 연결 획득 대기 시간 (-1: 무한 대기)
      connect-timeout: 2000ms   # Redis 연결 수립 타임아웃
      timeout: 5000ms           # Redis 명령 실행 타임아웃

  # ── Kafka 설정 ─────────────────────────────────────────────────────────────
  # 게시글 이벤트(CREATED, UPDATED, DELETED)를 토픽으로 발행
  # 다른 서비스(알림 서비스, 검색 인덱싱 서비스 등)가 구독하여 처리
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    # Kafka Producer 설정 (이벤트 발행자)
    producer:
      # 클라이언트 식별자 (Kafka 브로커 모니터링에서 서비스 식별)
      client-id: board-service-producer
      # 메시지 직렬화: 키/값 모두 String으로 직렬화 (JSON 문자열 전송)
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # acks=all: 리더 + 모든 팔로워 복제 확인 후 응답 (데이터 안전성 최우선)
      acks: all
      # 전송 실패 시 재시도 횟수 (네트워크 일시 장애 대응)
      retries: 3
      # 배치 처리 크기 (16KB): 소규모 메시지를 묶어 네트워크 효율 향상
      batch-size: 16384
      # 배치 대기 시간 (1ms): 짧은 대기로 처리량과 지연 균형
      linger-ms: 1
      # 압축 알고리즘: snappy는 CPU 효율적이면서 압축률 양호
      compression-type: snappy
      properties:
        # 중복 메시지 방지 (exactly-once semantics를 위한 기반)
        enable.idempotence: true

    # Kafka Consumer 설정 (이벤트 구독자 - 향후 확장용)
    consumer:
      group-id: board-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # earliest: 파티션의 가장 오래된 오프셋부터 소비 (신규 그룹 초기화 시)
      auto-offset-reset: earliest
      # 수동 오프셋 커밋 (메시지 처리 완료 후 커밋하여 데이터 손실 방지)
      enable-auto-commit: false

  # ── Jackson 직렬화 설정 ────────────────────────────────────────────────────
  jackson:
    # 날짜/시간을 ISO-8601 문자열로 직렬화 (Unix 타임스탬프 대신)
    # 예: "2024-01-15T12:30:00" 형식
    serialization:
      write-dates-as-timestamps: false
    # 알 수 없는 JSON 필드가 있어도 역직렬화 실패하지 않음 (API 버전 호환성)
    deserialization:
      fail-on-unknown-properties: false
    # 기본 날짜/시간 타임존 (UTC 사용으로 글로벌 서비스 대응)
    time-zone: UTC

# ── Kafka 토픽 설정 ─────────────────────────────────────────────────────────
# 커스텀 프로퍼티: 토픽명을 설정 파일로 관리하여 환경별 분리 가능
kafka:
  topics:
    board-events: board-events    # 게시글 생성/수정/삭제 이벤트 토픽

# ── Spring Boot Actuator 설정 ───────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        # health: Docker/K8s Probe, info: 서비스 정보, metrics: Prometheus 수집
        include: health,info,metrics
  endpoint:
    health:
      # always: MongoDB, Redis 연결 상태를 헬스체크에 포함
      show-details: always
  # Micrometer 메트릭 공통 태그 (Prometheus/Grafana 대시보드 필터링용)
  metrics:
    tags:
      application: ${spring.application.name}
      service: board

# ── 로깅 설정 ────────────────────────────────────────────────────────────────
logging:
  level:
    # 개발 환경: DEBUG로 SQL(MongoDB 쿼리) 및 비즈니스 로직 추적
    com.web3community.board: DEBUG
    # Spring Data MongoDB 쿼리 로깅 (운영에서는 INFO로 변경)
    org.springframework.data.mongodb: INFO
    # Kafka 이벤트 발행 로깅
    org.springframework.kafka: INFO
    # Reactor Netty 요청/응답 로깅 (운영에서는 WARN으로 변경)
    reactor.netty.http.server: INFO
  # 로그 패턴: 타임스탬프, 스레드, 레벨, 클래스명, 메시지
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{userId}] %logger{36} - %msg%n"
