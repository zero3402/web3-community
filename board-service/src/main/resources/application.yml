# ============================================================
# board-service 애플리케이션 설정
#
# 기술 스택: Spring Boot Web MVC + JPA + MySQL + Redis + Kafka
# 포트: 8083
# ============================================================

server:
  port: 8083

spring:
  application:
    name: board-service

  # ── MySQL / JPA 설정 ──────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/web3_board?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:web3user}
    password: ${DB_PASSWORD:web3pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: board-hikari-pool
      maximum-pool-size: 20       # 최대 커넥션 풀 크기
      minimum-idle: 5             # 최소 유휴 커넥션 수
      connection-timeout: 30000   # 커넥션 획득 최대 대기 시간 (ms)
      idle-timeout: 600000        # 유휴 커넥션 유지 시간 (10분)
      max-lifetime: 1800000       # 커넥션 최대 수명 (30분)

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      # update: 스키마 자동 업데이트 (개발 환경)
      # validate: 스키마 검증만 (운영 환경 - application-prod.yml에서 override)
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true          # SQL 포맷팅 (가독성 향상)
        default_batch_fetch_size: 100  # @ElementCollection N+1 방지
    show-sql: false               # 운영: false, 개발: application-local.yml에서 true

  # ── Redis 설정 ────────────────────────────────────────────────────────────────
  # 게시글 상세 캐싱 (TTL: 5분), StringRedisTemplate 사용
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis1234}
      database: 1                 # DB 인덱스 (0: api-gateway, 1: board-service)
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: -1ms
      connect-timeout: 2000ms
      timeout: 5000ms

  # ── Kafka 설정 ────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      client-id: board-service-producer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      compression-type: snappy
      properties:
        enable.idempotence: true

  # ── Jackson 직렬화 설정 ───────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

# ── Actuator 설정 ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# ── 로깅 설정 ─────────────────────────────────────────────────────────────────
logging:
  level:
    com.web3community.board: DEBUG
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
