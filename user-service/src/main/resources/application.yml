# ============================================================
# User Service 애플리케이션 설정
# ============================================================
# 사용자 정보 관리 서비스 설정 파일
# - Spring Data JPA + MySQL: 사용자 데이터 영속성
# - Kafka Consumer: auth-service의 UserCreatedEvent 소비
# - Redis: 사용자 프로필 캐시 (선택적)
# ============================================================

spring:
  application:
    name: user-service  # 서비스 이름 (서비스 디스커버리, Feign 호출 시 사용)

  # ─── MySQL 데이터소스 설정 ───────────────────────────────────────────────────
  datasource:
    # MySQL 연결 URL
    # allowPublicKeyRetrieval=true: 새 MySQL 서버 연결 시 공개키 자동 조회 허용
    # useSSL=false: 개발 환경에서 SSL 비활성화 (운영 환경에서는 true 권장)
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:web3_user}?characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # HikariCP 커넥션 풀 설정
      pool-name: user-service-pool
      maximum-pool-size: 10      # 최대 커넥션 수 (동시 트랜잭션 수)
      minimum-idle: 2            # 최소 유휴 커넥션 수
      connection-timeout: 30000  # 커넥션 획득 대기 시간 (30초)
      idle-timeout: 600000       # 유휴 커넥션 유지 시간 (10분)
      max-lifetime: 1800000      # 커넥션 최대 생존 시간 (30분)

  # ─── JPA 설정 ──────────────────────────────────────────────────────────────
  jpa:
    # Hibernate DDL 전략
    # update: 스키마 변경 사항을 자동으로 반영 (개발/로컬 환경)
    # validate: 스키마 일치 여부만 검증 (운영 환경에서는 validate 또는 none 사용)
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        # MySQL 8.x 방언: MySQL 8.0 특화 SQL 생성
        dialect: org.hibernate.dialect.MySQL8Dialect
        # SQL 로그 포맷팅 (개발 환경 디버깅용)
        format_sql: true
        # 기본 배치 크기 (N+1 문제 완화)
        default_batch_fetch_size: 100
    # 실행 SQL 로그 출력 (개발 환경에서만 true, 운영에서는 false)
    show-sql: false
    # 지연 로딩 시 Open Session In View 패턴 비활성화
    # (트랜잭션 범위 밖에서 지연 로딩을 허용하지 않아 명시적 설계 강제)
    open-in-view: false

  # ─── Redis 설정 ──────────────────────────────────────────────────────────
  # 사용자 프로필 캐시 (선택적, 향후 성능 최적화용)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 1  # DB 인덱스 1 (auth-service는 0 사용)
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

  # ─── Kafka Consumer 설정 ──────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      # Consumer 그룹 ID: 같은 그룹은 파티션을 나눠 소비 (병렬 처리)
      group-id: user-service-group
      # 오프셋 초기화 정책
      # earliest: 처음부터 모든 메시지 소비 (서비스 재시작 후 놓친 메시지 처리)
      # latest: 이후 새 메시지만 소비
      auto-offset-reset: earliest
      # 메시지 키 역직렬화: String
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # 메시지 값 역직렬화: JSON (UserCreatedEvent로 변환)
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # 역직렬화 신뢰 패키지: 모든 패키지 허용 (보안상 특정 패키지로 제한 권장)
        spring.json.trusted.packages: "*"
        # 타입 헤더 사용: 발행자가 설정한 타입 헤더를 사용하여 역직렬화
        spring.json.use.type.headers: false
        # 타겟 타입 지정: UserCreatedEvent로 역직렬화
        spring.json.value.default.type: com.web3community.common.dto.UserCreatedEvent

# ─── 서버 포트 설정 ────────────────────────────────────────────────────────
server:
  port: 8082  # User Service는 8082 포트 사용

# ─── 로깅 설정 ─────────────────────────────────────────────────────────────
logging:
  level:
    com.web3community.user: DEBUG              # User Service 상세 로그
    org.springframework.kafka: INFO            # Kafka 로그
    org.hibernate.SQL: DEBUG                   # JPA SQL 로그 (개발 환경)
    org.hibernate.type.descriptor.sql: TRACE  # JPA 바인딩 파라미터 로그 (개발 환경)

# ─── Spring Boot Actuator 설정 ────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics  # 외부 노출 엔드포인트
  endpoint:
    health:
      show-details: always
