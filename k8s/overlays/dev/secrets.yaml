apiVersion: v1
kind: Secret
metadata:
  name: web3-secrets
  namespace: web3-community
type: Opaque
stringData:
  # dev 환경 값 - 운영 비밀 정보는 절대 커밋 금지
  JWT_SECRET: "CHANGE_ME_DEV_JWT_SECRET_MIN_32_CHARS_LONG"
  MYSQL_USER: "web3user"
  MYSQL_PASSWORD: "CHANGE_ME_DEV_DB_PASSWORD"
  MYSQL_ROOT_PASSWORD: "CHANGE_ME_DEV_ROOT_PASSWORD"
