# ============================================================
# Auth Service 애플리케이션 설정
# ============================================================
# 인증/인가 전담 서비스 설정 파일
# - JWT 토큰 발급 및 검증
# - OAuth2 소셜 로그인 (Google / Naver / Kakao)
# - Redis Refresh Token 저장
# - Kafka 이벤트 발행
# ============================================================

spring:
  application:
    name: auth-service  # 서비스 이름 (Eureka 등록, Feign 호출 시 사용)

  # ─── Redis 설정 ──────────────────────────────────────────────────────────
  # Refresh Token 저장소 (TTL 기반 자동 만료)
  data:
    redis:
      host: ${REDIS_HOST:localhost}       # Redis 서버 호스트
      port: ${REDIS_PORT:6379}            # Redis 서버 포트
      password: ${REDIS_PASSWORD:}        # Redis 비밀번호 (없으면 공란)
      database: 0                         # 사용할 DB 인덱스 (0 = Refresh Token 전용)
      lettuce:
        pool:
          max-active: 8                   # 커넥션 풀 최대 활성 연결 수
          max-idle: 8                     # 커넥션 풀 최대 유휴 연결 수
          min-idle: 2                     # 커넥션 풀 최소 유휴 연결 수
          max-wait: -1ms                  # 풀에서 연결을 기다리는 최대 시간 (-1 = 무한 대기)

  # ─── OAuth2 클라이언트 설정 ────────────────────────────────────────────────
  # 소셜 로그인 제공자(Google/Naver/Kakao) 등록 정보
  security:
    oauth2:
      client:
        registration:

          # Google OAuth2 설정
          # 사전 조건: Google Cloud Console에서 OAuth 클라이언트 ID 생성 필요
          google:
            client-id: ${GOOGLE_CLIENT_ID}            # Google OAuth2 클라이언트 ID
            client-secret: ${GOOGLE_CLIENT_SECRET}    # Google OAuth2 클라이언트 시크릿
            redirect-uri: "{baseUrl}/auth/oauth2/google/callback"  # 인가 코드 수신 URI
            scope:
              - email
              - profile
            authorization-grant-type: authorization_code
            client-name: Google

          # Naver OAuth2 설정
          # 사전 조건: Naver Developers에서 애플리케이션 등록 필요
          naver:
            client-id: ${NAVER_CLIENT_ID}             # Naver OAuth2 클라이언트 ID
            client-secret: ${NAVER_CLIENT_SECRET}     # Naver OAuth2 클라이언트 시크릿
            redirect-uri: "{baseUrl}/auth/oauth2/naver/callback"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
              - profile_image
            client-name: Naver

          # Kakao OAuth2 설정
          # 사전 조건: Kakao Developers에서 애플리케이션 등록 필요
          kakao:
            client-id: ${KAKAO_CLIENT_ID}             # Kakao REST API 키
            client-secret: ${KAKAO_CLIENT_SECRET}     # Kakao OAuth2 클라이언트 시크릿
            redirect-uri: "{baseUrl}/auth/oauth2/kakao/callback"
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
            # Kakao는 client_secret_post 방식 사용
            client-authentication-method: client_secret_post

        provider:
          # Naver는 Spring Security 기본 지원 제공자가 아니므로 수동 설정
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response  # Naver는 응답 최상위 키가 "response"

          # Kakao도 Spring Security 기본 지원 제공자가 아니므로 수동 설정
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id  # Kakao는 사용자 고유 식별자로 id 사용

  # ─── Kafka 설정 ────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}  # Kafka 브로커 주소
    producer:
      # 메시지 직렬화: 키는 String, 값은 JSON(StringSerializer 후 Jackson으로 직렬화)
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # 메시지 전송 안정성 설정
      acks: all          # 모든 ISR 복제본에 쓰기 완료 후 ack (데이터 손실 방지)
      retries: 3         # 전송 실패 시 재시도 횟수
      properties:
        # Idempotent Producer: 중복 메시지 방지 (exactly-once semantics)
        enable.idempotence: true
        # JSON 타입 헤더 추가 (Consumer 측 역직렬화 시 타입 정보 활용)
        spring.json.add.type.headers: true

# ─── 서버 포트 설정 ───────────────────────────────────────────────────────────
server:
  port: 8081  # Auth Service는 8081 포트 사용

# ─── JWT 설정 ─────────────────────────────────────────────────────────────────
# common-module의 JwtUtils가 이 설정값을 읽어 토큰 생성/검증에 사용
jwt:
  secret: ${JWT_SECRET}                   # 서명 키 (256비트 이상의 Base64 인코딩된 비밀키)
  access-token-expiration: 1800000        # Access Token 만료 시간: 30분 (ms)
  refresh-token-expiration: 604800000     # Refresh Token 만료 시간: 7일 (ms)

# ─── Feign 클라이언트 설정 ────────────────────────────────────────────────────
feign:
  client:
    config:
      # user-service Feign 클라이언트 타임아웃 설정
      user-service:
        connect-timeout: 3000   # 연결 타임아웃: 3초
        read-timeout: 5000      # 읽기 타임아웃: 5초
      # 전체 기본 타임아웃 설정
      default:
        connect-timeout: 3000
        read-timeout: 5000
  # 서비스 디스커버리(Eureka) 없이 직접 URL로 호출하는 경우 활성화
  # circuitbreaker:
  #   enabled: true

# ─── User Service URL 설정 (Eureka 미사용 시 직접 URL) ───────────────────────
user-service:
  url: ${USER_SERVICE_URL:http://localhost:8082}

# ─── 로깅 설정 ────────────────────────────────────────────────────────────────
logging:
  level:
    com.web3community.auth: DEBUG                          # Auth Service 상세 로그
    org.springframework.security: DEBUG                    # Security 필터 체인 로그 (개발 환경)
    org.springframework.kafka: INFO                        # Kafka 로그
    feign: DEBUG                                           # Feign HTTP 요청/응답 로그

# ─── Spring Boot Actuator 설정 ────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics  # 외부 노출 엔드포인트
  endpoint:
    health:
      show-details: always
