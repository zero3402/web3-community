# 로컬 개발 환경용 설정 파일 (Eureka 없이 직접 localhost URL로 라우팅)
# 이 파일은 application.yml의 spring.cloud.gateway.routes를 오버라이드합니다.
# 실행 시 --spring.profiles.active=local 옵션을 사용하세요.

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2

        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=2
            - JwtAuthFilter

        - id: board-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/boards/**
          filters:
            - StripPrefix=2
            - JwtAuthFilter

        - id: blockchain-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/blockchain/**
          filters:
            - StripPrefix=2
            - JwtAuthFilter
